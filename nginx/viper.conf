# Deployed by Sinclair 2026-04-27 after Phase 1.
# Live file at /etc/nginx/sites-available/viper.dmarantz.com is authoritative.
# This is a checked-in snapshot for documentation + recovery only.
server {
    server_name viper.dmarantz.com;

    auth_basic "VIPER";
    auth_basic_user_file /etc/nginx/.htpasswd-viper;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/control.dmarantz.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/control.dmarantz.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = viper.dmarantz.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name viper.dmarantz.com;

    listen 80;
    return 404; # managed by Certbot


}
