# Deployed by Sinclair 2026-04-27 after Phase 1.
# Live file at /etc/nginx/sites-available/cortex.dmarantz.com is authoritative.
# This is a checked-in snapshot for documentation + recovery only.
server {
    server_name cortex.dmarantz.com;

    auth_basic "CORTEX";
    auth_basic_user_file /etc/nginx/.htpasswd-cortex;

    location / {
        root /var/www/cortex;
        index index.html;
        try_files $uri $uri/ =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/control.dmarantz.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/control.dmarantz.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = cortex.dmarantz.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name cortex.dmarantz.com;

    listen 80;
    return 404; # managed by Certbot


}
