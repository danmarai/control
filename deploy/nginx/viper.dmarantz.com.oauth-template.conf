# OAuth2-proxy nginx template for viper.dmarantz.com
# DO NOT install to /etc/nginx yet — waiting on Dan's Google OAuth credentials.
server {
    listen 443 ssl;
    server_name viper.dmarantz.com;

    ssl_certificate /etc/letsencrypt/live/control.dmarantz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/control.dmarantz.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── oauth2-proxy endpoints ─────────────────────────────
    location /oauth2/ {
        proxy_pass http://127.0.0.1:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }
    location = /oauth2/auth {
        proxy_pass http://127.0.0.1:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
    }

    # ── Protected app ──────────────────────────────────────
    location / {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;

        auth_request_set $email   $upstream_http_x_auth_request_email;
        auth_request_set $user    $upstream_http_x_auth_request_user;
        auth_request_set $token   $upstream_http_x_auth_request_access_token;
        proxy_set_header X-Auth-Email $email;
        proxy_set_header X-Auth-User  $user;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    if ($host = viper.dmarantz.com) {
        return 301 https://$host$request_uri;
    }
    server_name viper.dmarantz.com;
    listen 80;
    return 404;
}
